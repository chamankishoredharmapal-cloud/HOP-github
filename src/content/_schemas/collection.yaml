$schema: http://json-schema.org/draft-07/schema#
type: object
title: Collection Narrative
description: Extended editorial narrative for a collection, complementing the database record
required:
  - type
  - name
  - slug
  - status
  - tagline
  - hero
  - lookbook
  - seo
properties:
  type:
    type: string
    const: collection
  name:
    type: string
    description: Collection name (e.g., Kalyani, Viara)
  slug:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: URL slug matching the database slug
  status:
    type: string
    enum:
      - draft
      - published
      - archive
  tagline:
    type: string
    maxLength: 120
    description: Short tagline displayed under the collection name
  hero:
    type: string
    description: Relative path to hero image
  filmPoster:
    type: string
    description: Relative path to collection film poster image
  mood:
    type: string
    description: A single sentence describing the collection's mood, used for editorial direction
  occasion:
    type: string
    description: What occasion this collection belongs to
  weaverNote:
    type: string
    description: A quote or note from the weaver about this collection
  lookbook:
    type: array
    items:
      type: string
    description: Paths to lookbook images
  seo:
    type: object
    properties:
      title:
        type: string
        maxLength: 70
      description:
        type: string
        maxLength: 160
    required:
      - title
      - description
  relatedArticles:
    type: array
    items:
      type: string
    description: Slugs of related journal articles
  relatedCraftNotes:
    type: array
    items:
      type: string
    description: Slugs of related craft notes
