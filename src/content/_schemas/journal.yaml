$schema: http://json-schema.org/draft-07/schema#
type: object
title: Journal Article
description: A journal article — the primary editorial content type for House of Padmavati
required:
  - type
  - title
  - slug
  - published
  - status
  - author
  - tag
  - dek
  - hero
  - alt
  - seo
properties:
  type:
    type: string
    const: journal
    description: Must be 'journal' for journal articles
  title:
    type: string
    description: Full title of the article, sentence case
    examples:
      - "How morning light reads a weave."
  slug:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: URL slug, kebab-case, auto-generated from title
  published:
    type: string
    format: date
    description: Publication date in YYYY-MM-DD format
  updated:
    type: string
    format: date
    description: Last updated date in YYYY-MM-DD format
  status:
    type: string
    enum:
      - draft
      - review
      - published
      - archive
    description: Publication status
  author:
    type: string
    default: "House of Padmavati"
    description: Author name
  tag:
    type: string
    enum:
      - Light
      - Drape
      - Linen
      - Weather
      - Ritual
      - House
      - Technique
      - Weaver
      - Place
      - Care
      - Occasion
    description: Controlled vocabulary tag for categorization
  dek:
    type: string
    maxLength: 160
    description: Subtitle or summary, displayed on index cards and in meta descriptions
  readingTime:
    type: integer
    minimum: 1
    description: Calculated reading time in minutes. Auto-generated by compiler, can be overridden
  hero:
    type: string
    description: Relative path to hero image (e.g., ./hero.jpg)
  alt:
    type: string
    description: Alt text for the hero image
  seo:
    type: object
    properties:
      title:
        type: string
        maxLength: 70
        description: SEO title, defaults to "{title} — House of Padmavati"
      description:
        type: string
        maxLength: 160
        description: Meta description, defaults to dek
    required:
      - title
      - description
  ogImage:
    type: string
    description: Path to Open Graph image, defaults to hero
  relatedProducts:
    type: array
    items:
      type: string
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
    description: UUIDs of related products from the database
  relatedArticles:
    type: array
    items:
      type: string
    description: Slugs of related journal articles
  glossaryTerms:
    type: array
    items:
      type: string
    description: Slugs of glossary terms referenced in the article
